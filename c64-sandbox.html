<!DOCTYPE html>
<!-- ── c64-sandbox.html ───────────────────────────────────────────────────────
  Chrome extension sandbox page.  Listed under "sandbox.pages" in manifest.json
  so Chrome assigns it a relaxed CSP (includes 'unsafe-eval' / 'wasm-unsafe-eval')
  that allows WebAssembly compilation — the whole reason this iframe exists.

  The page has a unique opaque origin and cannot use chrome.* APIs.  It
  communicates with the extension's newtab page exclusively via postMessage.

  c64-sandbox.js is a type="module" script that imports vendor/vice_x64sc_libretro.js
  (the RetroArch/VICE libretro Emscripten build) and drives it via the libretro API.
──────────────────────────────────────────────────────────────────────────── -->
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    html, body { margin: 0; padding: 0; background: #000; width: 100%; height: 100%; }
    #c64-screen { display: block; width: 100%; height: 100%; }
  </style>
  <!-- C64 sandbox: imports the libretro VICE module and wires postMessage. -->
  <script type="module" src="c64-sandbox.js"></script>
</head>
<body>
  <canvas id="c64-screen"></canvas>
</body>
</html>
