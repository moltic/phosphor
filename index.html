<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>&gt; _</title>
  <link rel="icon" type="image/png" href="phos.png" />

  <!-- VT323 retro monospaced font — served locally via @font-face in style.css -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- CRT scanline overlay (purely decorative, aria-hidden) -->
  <div id="scanlines" aria-hidden="true"></div>

  <div id="terminal" role="main">

    <!-- ═══════════════════════════════════════════════════ -->
    <!--  ASCII-art header — rendered in a <pre> for exact  -->
    <!--  whitespace fidelity                               -->
    <!-- ═══════════════════════════════════════════════════ -->
    <header id="header" aria-label="Phosphor — CRT Terminal New Tab">
      <div id="banner-row">
        <pre id="ascii-art" aria-hidden="true"></pre>
      </div>
      <div id="status-line">
        <img id="logo" src="phos.png" alt="Phosphor" />
        <span id="status-label"></span>
        <span id="status-time" aria-live="off"></span>
      </div>
    </header>

    <!-- ═══════════════════════════════════════════════════ -->
    <!--  Speed-dial grid (populated by JS from storage)    -->
    <!-- ═══════════════════════════════════════════════════ -->
    <div id="speed-dial-wrap">
      <button id="dial-edit-toggle" aria-label="Toggle speed-dial edit mode" title="Edit layout">[EDIT]</button>
      <div id="speed-dial" role="navigation" aria-label="Speed dial shortcuts"></div>
    </div>

    <!-- ═══════════════════════════════════════════════════ -->
    <!--  Main scrollable output area                       -->
    <!-- ═══════════════════════════════════════════════════ -->
    <div
      id="output"
      role="log"
      aria-live="polite"
      aria-label="Terminal output"
    ></div>

    <!-- ▼ shown when #output has content below the fold ══════ -->
    <div id="scroll-more" aria-hidden="true">▼  MORE  ▼</div>

    <!-- ═══════════════════════════════════════════════════ -->
    <!--  Sticky command-line input                         -->
    <!--                                                    -->
    <!--  Architecture: the real <input> is invisible and   -->
    <!--  captures all keystrokes. #input-display + #cursor -->
    <!--  render the visible text so we can show a proper   -->
    <!--  blinking underscore cursor.                       -->
    <!-- ═══════════════════════════════════════════════════ -->
    <div id="input-row" aria-label="Command input">
      <span class="prompt-glyph" aria-hidden="true">&gt;&nbsp;</span>
      <span id="input-display" aria-hidden="true"></span>
      <span id="cursor" class="blink" aria-hidden="true">_</span>
      <!-- The real input; transparent but on top, handles keyboard -->
      <input
        id="cmd-input"
        type="text"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        aria-label="Enter command"
      />
    </div>

  </div><!-- /#terminal -->

  <!-- Undo toast — shown briefly after a speed-dial is removed -->
  <div id="dial-undo-toast" role="status" aria-live="assertive" aria-atomic="true">
    <span class="dial-undo-toast-msg"></span>
    <button class="dial-undo-toast-btn">[UNDO]</button>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
